name: Release provenance

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: Release tag/version to attest
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  attest-release-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout release source
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify source
        run: npm run typecheck && npm run lint:obsidian && npm test

      - name: Build release assets
        run: npm run build

      - name: Verify manifest matches release tag
        shell: bash
        run: |
          manifest_version="$(node -p "require('./manifest.json').version")"
          test "$manifest_version" = "${{ steps.release.outputs.tag }}"

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Upload attested release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${{ steps.release.outputs.tag }}" main.js manifest.json styles.css --clobber
